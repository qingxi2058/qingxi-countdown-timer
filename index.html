    <script>
      // 悬浮按钮开关
      var fabOpen = false;
      function toggleFab() {
        fabOpen = !fabOpen;
        var container = document.getElementById('fabContainer');
        container.classList.toggle('fab-active', fabOpen);
      }
      // 点外部关闭
      document.addEventListener('click', function(e) {
        if (fabOpen && !document.getElementById('fabContainer').contains(e.target)) {
          fabOpen = false;
          document.getElementById('fabContainer').classList.remove('fab-active');
        }
      });
      // 复制微信号
      function copyWechat() {
        var wechat = 'qingxi20250501';
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(wechat).then(showWxCopied).catch(function(){ fallbackWx(wechat); });
        } else { fallbackWx(wechat); }
      }
      function fallbackWx(text) {
        var ta = document.createElement('textarea');
        ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
        document.body.appendChild(ta); ta.select();
        try { document.execCommand('copy'); showWxCopied(); } catch(e){}
        document.body.removeChild(ta);
      }
      function showWxCopied() {
        var el = document.getElementById('wxText');
        el.textContent = '已复制！去加我';
        setTimeout(function(){ el.textContent = '微信号'; }, 2500);
      }

      // 复制链接功能
      function handleCopyLink() {
        const url = 'https://qingxi-countdown-timer.vercel.app';
        const text = '下班倒计时摸鱼神器，打工人必备！' + url;
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(function() {
            showCopyToast();
          }).catch(function() {
            fallbackCopy(text);
          });
        } else {
          fallbackCopy(text);
        }
      }
      function fallbackCopy(text) {
        var ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        try { document.execCommand('copy'); showCopyToast(); } catch(e) {}
        document.body.removeChild(ta);
      }
      function showCopyToast() {
        var btn = document.getElementById('copyLinkBtn');
        var orig = btn.textContent;
        btn.textContent = '✅ 已复制！去发给同事';
        btn.style.background = 'rgba(57,255,20,0.18)';
        btn.style.borderColor = 'rgba(57,255,20,0.5)';
        setTimeout(function() {
          btn.textContent = orig;
          btn.style.background = '';
          btn.style.borderColor = '';
        }, 2500);
      }
