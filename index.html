<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>下班倒计时屏保</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@300;400;600;700&family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="top">
        <div class="brand">
          <div class="brand-dot"></div>
          <div>
            <h1>⏱ 到点提醒</h1>
            <p>把流逝的时间，变成可判断的进度。</p>
          </div>
        </div>
        <div class="controls">
          <div class="meta-time" id="beijingTime">北京时间 00:00</div>
          <label>
            <span>下班时间</span>
            <input type="time" id="endTime" value="18:00" />
          </label>
          <label>
            <span>月薪（元/月）</span>
            <div class="salary-input">
              <input
                type="text"
                id="monthlySalary"
                inputmode="decimal"
                autocomplete="off"
                spellcheck="false"
                value="8000"
              />
              <button
                type="button"
                id="salaryToggle"
                class="salary-toggle"
                aria-label="显示月薪"
                aria-pressed="false"
              >
                <svg class="eye-closed" viewBox="0 0 24 24" aria-hidden="true">
                  <path
                    d="M2.5 12c2.8-4.8 6.7-7.2 11.5-7.2 4.9 0 8.7 2.4 11.5 7.2-2.8 4.8-6.7 7.2-11.5 7.2-4.8 0-8.7-2.4-11.5-7.2Z"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.7"
                  />
                  <path
                    d="M7 12a5 5 0 1 0 10 0 5 5 0 0 0-10 0Z"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.7"
                  />
                  <path
                    d="m3 3 18 18"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.7"
                    stroke-linecap="round"
                  />
                </svg>
                <svg class="eye-open" viewBox="0 0 24 24" aria-hidden="true">
                  <path
                    d="M2.5 12c2.8-4.8 6.7-7.2 11.5-7.2 4.9 0 8.7 2.4 11.5 7.2-2.8 4.8-6.7 7.2-11.5 7.2-4.8 0-8.7-2.4-11.5-7.2Z"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.7"
                  />
                  <path
                    d="M7 12a5 5 0 1 0 10 0 5 5 0 0 0-10 0Z"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.7"
                  />
                </svg>
              </button>
            </div>
            <span class="input-hint">仅在本地计算，不记录，也不评判</span>
          </label>
          <label class="toggle">
            <span>轻微提醒</span>
            <div class="toggle-row">
              <input type="checkbox" id="remindThirty" />
              <span>距离下班 30 分钟时提示</span>
            </div>
          </label>
        </div>
      </header>

      <main class="display">
        <div class="penalty" id="penalty" aria-hidden="true">
          <span class="penalty-sub">已到设定时间</span>
          <span class="penalty-main">这一天够了，该回归生活了。</span>
        </div>
        <div class="countdown" id="countdown">00:00:00</div>
        <div class="status" id="status">距离结束节点还有</div>
        <div class="today-earnings">
          <span>今日累计进度</span>
          <strong id="todayEarned">0.0000</strong>
        </div>
        <div class="today-note">按你的月薪和工作时长自动换算</div>
      </main>

      <div class="toast" id="toast" aria-live="polite"></div>
      <div class="barrage" id="barrage" aria-hidden="true"></div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
